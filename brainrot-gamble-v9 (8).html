<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainRot Gamble</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #0a0a1a;
  font-family: 'Fredoka One', cursive;
  color: white;
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse at 20% 20%, rgba(255,50,200,0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(50,100,255,0.15) 0%, transparent 50%);
  overflow-x: hidden;
}

@keyframes rainbow { to { background-position: 300% center; } }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
@keyframes chestBounce { 0%,100%{transform:rotate(0) scale(1)} 25%{transform:rotate(-10deg) scale(1.15)} 75%{transform:rotate(10deg) scale(1.15)} }
@keyframes cardPop { from{transform:scale(0) rotateY(180deg);opacity:0} to{transform:scale(1) rotateY(0deg);opacity:1} }
@keyframes glowPulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
@keyframes notifSlide { from{transform:translateX(200px);opacity:0} to{transform:translateX(0);opacity:1} }

.save-modal-bg {
  position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:500;
  display:flex; align-items:center; justify-content:center; padding:20px;
}
.save-modal {
  background:#0f0f2e; border:2px solid #a855f7;
  border-radius:20px; padding:30px; max-width:500px; width:100%;
  box-shadow:0 0 40px rgba(168,85,247,0.3);
}
.save-modal h2 { font-size:1.6em; margin-bottom:20px; color:#c084fc; text-align:center; }
.save-modal textarea {
  width:100%; height:90px; background:#1a1a3e;
  border:1px solid rgba(255,255,255,0.2); border-radius:10px;
  color:white; font-family:monospace; font-size:0.8em;
  padding:10px; resize:none; margin-bottom:14px;
}
.save-modal textarea:focus { outline:none; border-color:#a855f7; }
.save-modal-btns { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
.sm-btn {
  background:rgba(255,255,255,0.1); border:2px solid rgba(255,255,255,0.2);
  border-radius:12px; padding:10px 20px;
  font-family:'Fredoka One',cursive; font-size:1em; color:white; cursor:pointer;
  transition:all 0.2s;
}
.sm-btn:hover { background:rgba(255,255,255,0.2); }
.sm-btn.primary { border-color:#a855f7; background:rgba(168,85,247,0.2); }
.sm-btn.primary:hover { background:rgba(168,85,247,0.35); }
.sm-btn.danger { border-color:#ef4444; background:rgba(239,68,68,0.15); }
.sm-btn.danger:hover { background:rgba(239,68,68,0.3); }
.offline-banner {
  background:linear-gradient(135deg,rgba(234,179,8,0.15),rgba(234,179,8,0.05));
  border:1px solid rgba(234,179,8,0.4); border-radius:12px;
  padding:12px 20px; margin-bottom:20px; text-align:center;
  color:#fbbf24; font-size:1em;
}
.save-btn-header {
  background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.15);
  border-radius:20px; padding:6px 14px;
  font-family:'Fredoka One',cursive; font-size:0.85em; color:rgba(255,255,255,0.7);
  cursor:pointer; transition:all 0.2s; margin-left:8px;
}
.save-btn-header:hover { background:rgba(255,255,255,0.15); color:white; }

.save-bubble-wrap {
  display:inline-flex; align-items:center; position:relative; margin-left:4px;
}
.save-bubble-svg {
  animation:bubble-pulse 2.4s ease-in-out infinite;
  cursor:default; user-select:none; overflow:visible;
  filter:drop-shadow(0 3px 10px rgba(249,115,22,0.6));
}
.save-bubble-text {
  font-family:'Fredoka One',cursive;
  font-size:13px;
  font-weight:bold;
  fill:#1a0a00;
  pointer-events:none;
}
@keyframes bubble-pulse {
  0%,100% { transform:scale(1); }
  50%      { transform:scale(1.09); }
}

.rainbow-text {
  background: linear-gradient(90deg,#ff00ff,#00ffff,#ffff00,#ff00ff);
  background-size:300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:rainbow 3s linear infinite;
  filter:drop-shadow(0 0 8px #ff00ff);
}
.chest-float { animation: float 3s ease-in-out infinite; display:block; }
.pulse { animation: pulse 2s ease-in-out infinite; }

.header {
  position:fixed; top:0; left:0; right:0; z-index:100;
  background:rgba(0,0,0,0.88);
  backdrop-filter:blur(10px);
  border-bottom:2px solid rgba(255,255,255,0.08);
  padding:12px 20px;
  display:flex; align-items:center; justify-content:space-between;
  height:70px;
}
.header-title { font-size:1.8em; }
.coins-badge {
  background:linear-gradient(135deg,#1a1a2e,#16213e);
  border:2px solid #ffd700;
  border-radius:30px;
  padding:8px 18px; font-size:1em; color:#ffd700;
  box-shadow:0 0 15px rgba(255,215,0,0.3);
  display:flex; align-items:center; gap:8px;
}

.menu-center {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:30px;
  padding-top:90px; min-height:100vh;
}
.menu-logo { font-size:4em; text-align:center; }
.menu-subtitle { color:rgba(255,255,255,0.5); letter-spacing:3px; font-size:1em; }
.per-sec-badge {
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:15px; padding:10px 25px; font-size:1em; color:#22c55e;
}
.menu-btns { display:flex; gap:20px; flex-wrap:wrap; justify-content:center; }
.menu-btn {
  background:linear-gradient(135deg,#1a1a3e,#2a1a5e);
  border-radius:20px; padding:25px 50px;
  font-family:'Fredoka One',cursive; font-size:1.5em;
  cursor:pointer; transition:all 0.2s; border:3px solid; color:white;
}
.menu-btn:hover { transform:translateY(-5px) scale(1.03); }
.menu-btn:active { transform:scale(0.96); }
.btn-coll { border-color:#a855f7; box-shadow:0 0 20px rgba(168,85,247,0.35); }
.btn-shop { border-color:#f97316; box-shadow:0 0 20px rgba(249,115,22,0.35); }

.screen-top {
  display:flex; align-items:center; gap:15px;
  margin-bottom:25px; padding-top:85px;
}
.back-btn {
  background:rgba(255,255,255,0.08);
  border:2px solid rgba(255,255,255,0.2);
  border-radius:12px; padding:10px 18px;
  font-family:'Fredoka One',cursive; font-size:1em; color:white; cursor:pointer;
  transition:all 0.2s;
}
.back-btn:hover { background:rgba(255,255,255,0.18); }
.screen-title {
  font-size:2em;
  background:linear-gradient(90deg,#ff8800,#ff00ff);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}

.chests-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr));
  gap:18px; max-width:1100px; margin:0 auto;
}
.chest-card {
  border-radius:20px; padding:25px 18px; text-align:center;
  transition:all 0.25s; position:relative; overflow:hidden;
}
.chest-card:hover { transform:translateY(-6px); }
.chest-emoji-big { font-size:3.2em; margin-bottom:10px; }
.chest-name { font-size:1.3em; margin-bottom:5px; }
.chest-price { font-size:1em; color:#ffd700; margin-bottom:14px; }
.buy-btn {
  background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.25);
  border-radius:30px; padding:10px 0; width:100%;
  font-family:'Fredoka One',cursive; font-size:1em; color:white; cursor:pointer;
  transition:all 0.2s; display:block;
}
.buy-btn:hover:not(:disabled) { background:rgba(255,255,255,0.22); }
.buy-btn:disabled { opacity:0.4; cursor:not-allowed; }
.chest-proba { font-size:0.68em; color:rgba(255,255,255,0.45); line-height:1.9; margin-top:10px; text-align:left; }

.coll-stats {
  background:rgba(34,197,94,0.08); border:1px solid rgba(34,197,94,0.25);
  border-radius:12px; padding:12px 20px; margin-bottom:22px;
  font-size:1.1em; color:#22c55e; text-align:center;
}
.cards-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:14px; max-width:1100px; margin:0 auto;
}
.br-card {
  background:#0f0f2e; border-radius:14px; padding:14px 10px;
  text-align:center; position:relative; transition:transform 0.2s; overflow:hidden;
}
.br-img-wrap { width:80px; height:80px; margin:0 auto 6px; border-radius:10px; overflow:hidden; background:rgba(255,255,255,0.05); display:flex; align-items:center; justify-content:center; }
.revealed-img-wrap { width:120px; height:120px; margin:0 auto 12px; border-radius:15px; overflow:hidden; background:rgba(255,255,255,0.05); display:flex; align-items:center; justify-content:center; }
.br-card:hover { transform:scale(1.04); }
.br-card-border { position:absolute; inset:0; border-radius:14px; border:2px solid; pointer-events:none; }
.br-emoji { font-size:3em; display:block; margin-bottom:6px; }
.br-name { font-size:0.82em; line-height:1.2; margin-bottom:4px; }
.br-rarity { font-size:0.72em; margin-bottom:4px; }
.br-gain { font-size:0.78em; color:#ffd700; }
.br-count {
  position:absolute; top:7px; right:7px;
  background:rgba(0,0,0,0.7); border-radius:8px; padding:2px 7px; font-size:0.72em;
}
.empty { text-align:center; padding:60px 20px; color:rgba(255,255,255,0.35); font-size:1.2em; }

.overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.93); z-index:999;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:30px;
}
.opening-chest-anim { font-size:8em; animation: chestBounce 0.45s ease-in-out 4; }
.card-reveal { animation: cardPop 0.6s cubic-bezier(0.175,0.885,0.32,1.275) forwards; }
.revealed-inner {
  background:#0f0f2e; border-radius:20px; padding:30px 45px;
  text-align:center; position:relative; min-width:250px;
}
.revealed-glow {
  position:absolute; inset:-3px; border-radius:23px; border:3px solid;
  animation:glowPulse 1.5s ease-in-out infinite; pointer-events:none;
}
.revealed-label { font-size:1em; letter-spacing:3px; text-transform:uppercase; margin-bottom:12px; }
.revealed-emoji { font-size:5em; display:block; margin-bottom:10px; }
.revealed-name { font-size:1.7em; margin-bottom:8px; }
.revealed-gain-txt { font-size:1em; color:#ffd700; }
.continue-btn {
  background:linear-gradient(135deg,#7c3aed,#ec4899); border:none; border-radius:30px;
  padding:15px 55px; font-family:'Fredoka One',cursive; font-size:1.4em; color:white; cursor:pointer;
  transition:all 0.2s; box-shadow:0 5px 25px rgba(236,72,153,0.4);
}
.continue-btn:hover { transform:scale(1.06); }

.notif {
  position:fixed; bottom:20px; right:20px;
  background:rgba(10,10,26,0.95); border:2px solid; border-radius:14px;
  padding:12px 20px; font-size:1em; z-index:9999;
  animation:notifSlide 0.3s ease-out; pointer-events:none;
}

/* chest themes */
.bg-commun    { background:linear-gradient(135deg,#181828,#22223a); border:2px solid #9ca3af; box-shadow:0 5px 20px rgba(156,163,175,0.2); }
.bg-rare      { background:linear-gradient(135deg,#0a0f2e,#0f1a3e); border:2px solid #3b82f6; box-shadow:0 5px 20px rgba(59,130,246,0.25); }
.bg-epique    { background:linear-gradient(135deg,#2e0a1a,#3e0f2a); border:2px solid #ec4899; box-shadow:0 5px 20px rgba(236,72,153,0.25); }
.bg-mythique  { background:linear-gradient(135deg,#2e0a0a,#3e0f0f); border:2px solid #ef4444; box-shadow:0 5px 20px rgba(239,68,68,0.25); }
.bg-ultime    { background:linear-gradient(135deg,#0a2e3e,#0f3a4e); border:2px solid #06b6d4; box-shadow:0 5px 20px rgba(6,182,212,0.3); }
</style>
</head>

function fmt(n) {
  n = Math.floor(n);
  if (n >= 1e12) return (n/1e12).toFixed(2)+'T';
  if (n >= 1e9)  return (n/1e9).toFixed(2)+'B';
  if (n >= 1e6)  return (n/1e6).toFixed(2)+'M';
  if (n >= 1e3)  return (n/1e3).toFixed(1)+'K';
  return n.toLocaleString('fr');
}

function pickRarity(proba) {
  const entries = Object.entries(proba);
  let r = Math.random() * entries.reduce((s,[,p])=>s+p,0);
  for (const [k,p] of entries) { r -= p; if (r <= 0) return k; }
  return entries[0][0];
}

  const [failed, setFailed] = React.useState(false);
  if (failed) return React.createElement('span', {className: emojiClass}, fallback);
  return React.createElement('div', {className: wrapClass},
    React.createElement('img', {
      src, alt: fallback,
      onError: () => setFailed(true),
      style:{width:'100%',height:'100%',objectFit:'cover',borderRadius:'10px'}
    })
  );
}

function migrateCollection(col) {
  const out = {};
  for (const [n, d] of Object.entries(col)) {
    const nn = CARD_MIGRATIONS[n] || n;
    if (out[nn]) out[nn] = {...out[nn], count: out[nn].count + d.count};
    else out[nn] = d;
  }
  return out;
}

// ===== SAVE / LOAD HELPERS =====
const SAVE_KEY = 'brainrot_v2';

function encodeState(coins, collection, timestamp) {
  try {
    return btoa(unescape(encodeURIComponent(JSON.stringify({coins, collection, ts: timestamp}))));
  } catch(e) { return ''; }
}

function decodeState(code) {
  try {
    const s = JSON.parse(decodeURIComponent(escape(atob(code.trim()))));
    if (s && s.collection) s.collection = migrateCollection(s.collection);
    return s;
  } catch(e) { return null; }
}

function lsTrySave(coins, collection) {
  try { localStorage.setItem(SAVE_KEY, encodeState(coins, collection, Date.now())); } catch(e) {}
}

function lsTryLoad() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) { const s = decodeState(raw); return s; }
  } catch(e) {}
  return null;
}

// ===== APP =====
function App() {
  // Try to load from localStorage on first render
  const initData = (() => {
    const saved = lsTryLoad();
    if (saved) return saved;
    return { coins: 2000, collection: {}, ts: null };
  })();

  const [screen, setScreen]     = useState('menu');
  const [coins, setCoins]       = useState(initData.coins);
  const [collection, setCollection] = useState(initData.collection);
  const [opening, setOpening]   = useState(null);
  const [notifs, setNotifs]     = useState([]);
  const [saveModal, setSaveModal] = useState(false);
  const [saveCode, setSaveCode]  = useState('');
  const [loadInput, setLoadInput] = useState('');
  const [offlineGain, setOfflineGain] = useState(null);
  const coinsRef = useRef(initData.coins);
  const collectionRef = useRef(initData.collection);

  // Compute offline gain from saved timestamp
  useEffect(() => {
    if (!initData.ts) return;
    const elapsed = (Date.now() - initData.ts) / 1000; // seconds
    if (elapsed < 10) return;
    const ps = Object.values(initData.collection).reduce((s,d) => s + RARITIES[d.rarity].gain * d.count, 0);
    if (ps <= 0) return;
    const gained = Math.floor(ps * elapsed);
    if (gained > 0) {
      setCoins(c => c + gained);
      setOfflineGain(gained);
      setTimeout(() => setOfflineGain(null), 6000);
    }
  }, []);

  useEffect(() => { coinsRef.current = coins; }, [coins]);
  useEffect(() => { collectionRef.current = collection; }, [collection]);

  const perSec = Object.values(collection).reduce((s,d) => s + RARITIES[d.rarity].gain * d.count, 0);

  // Passive income tick
  useEffect(() => {
    if (perSec <= 0) return;
    const id = setInterval(() => setCoins(c => c + perSec / 10), 100);
    return () => clearInterval(id);
  }, [perSec]);

  // Auto-save to localStorage every 10s
  useEffect(() => {
    const id = setInterval(() => {
      lsTrySave(coinsRef.current, collectionRef.current);
    }, 10000);
    return () => clearInterval(id);
  }, []);

  // Opening animation phases
  useEffect(() => {
    if (!opening) return;
    if (opening.phase === 'shake') {
      const t = setTimeout(() => setOpening(o => o && {...o, phase:'reveal'}), 2000);
      return () => clearTimeout(t);
    }
    if (opening.phase === 'reveal') {
      const t = setTimeout(() => setOpening(o => o && {...o, phase:'ready'}), 800);
      return () => clearTimeout(t);
    }
  }, [opening && opening.phase]);

  function notify(msg, color='#22c55e') {
    const id = Date.now() + Math.random();
    setNotifs(n => [...n, {id, msg, color}]);
    setTimeout(() => setNotifs(n => n.filter(x => x.id !== id)), 3500);
  }

  function handleOpenChest(chestId) {
    const chest = CHESTS.find(c => c.id === chestId);
    if (coinsRef.current < chest.price) {
      notify('❌ Pas assez de pièces ! (' + fmt(chest.price) + ' requises)', '#ef4444');
      return;
    }
    setCoins(c => c - chest.price);
    const rarity = pickRarity(chest.proba);
    const pool = BRAINROTS[rarity];
    const br = pool[Math.floor(Math.random() * pool.length)];
    setCollection(prev => {
      const next = {...prev};
      if (next[br.name]) next[br.name] = {...next[br.name], count: next[br.name].count + 1};
      else next[br.name] = {rarity, count:1, emoji:br.emoji};
      return next;
    });
    setOpening({chestEmoji: chest.emoji, phase:'shake', br, rarity});
  }

  function handleOpenSave() {
    const code = encodeState(coinsRef.current, collectionRef.current, Date.now());
    setSaveCode(code);
    setLoadInput('');
    setSaveModal(true);
  }

  function handleCopyCode() {
    try {
      navigator.clipboard.writeText(saveCode);
      notify('✅ Code copié dans le presse-papier !');
    } catch(e) {
      notify('📋 Copie manuelle : sélectionne le texte ci-dessus', '#fbbf24');
    }
  }

  function handleLoadCode() {
    const data = decodeState(loadInput);
    if (!data || typeof data.coins !== 'number' || typeof data.collection !== 'object') {
      notify('❌ Code invalide !', '#ef4444');
      return;
    }
    setCoins(data.coins);
    setCollection(data.collection);
    setSaveModal(false);
    notify('✅ Sauvegarde chargée avec succès !');
  }

  function handleReset() {
    if (!confirm('Remettre à zéro ? Toute ta progression sera perdue !')) return;
    setCoins(2000);
    setCollection({});
    setSaveModal(false);
    try { localStorage.removeItem(SAVE_KEY); } catch(e) {}
    notify('🔄 Partie réinitialisée.', '#f97316');
  }

  return React.createElement(React.Fragment, null,
    React.createElement('div', {className:'header'},
      React.createElement('div', {className:'header-title rainbow-text'}, '🧠 BrainRot Gamble'),
      React.createElement('div', {style:{display:'flex',alignItems:'center',gap:'10px'}},
        React.createElement('div', {className:'save-bubble-wrap'},
          React.createElement('button', {className:'save-btn-header', onClick: handleOpenSave}, '💾 Sauv.'),
          React.createElement('svg', {
            className:'save-bubble-svg',
            width:'160', height:'54',
            viewBox:'0 0 160 54',
            xmlns:'http://www.w3.org/2000/svg'
          },
            React.createElement('defs', null,
              React.createElement('linearGradient', {id:'bubbleGrad', x1:'0%', y1:'0%', x2:'100%', y2:'100%'},
                React.createElement('stop', {offset:'0%', stopColor:'#f97316'}),
                React.createElement('stop', {offset:'100%', stopColor:'#fbbf24'})
              )
            ),
            /* Corps principal arrondi */
            React.createElement('rect', {
              x:'4', y:'4', width:'152', height:'46',
              rx:'14', ry:'14',
              fill:'url(#bubbleGrad)',
              stroke:'#ea6a00',
              strokeWidth:'1.5'
            }),
            /* Texte */
            React.createElement('text', {
              className:'save-bubble-text',
              x:'80', y:'31',
              textAnchor:'middle',
              dominantBaseline:'middle'
            }, '💡 Pense à sauvegarder !')
          )
        ),
        React.createElement('div', {className:'coins-badge'},
          React.createElement('span', null, '🪙'),
          React.createElement('span', null, fmt(coins))
        )
      )
    ),

    screen === 'menu' && React.createElement(MenuScreen, {perSec, setScreen, offlineGain}),
    screen === 'shop' && React.createElement(ShopScreen, {coins, setScreen, onOpen: handleOpenChest}),
    screen === 'collection' && React.createElement(CollectionScreen, {collection, perSec, setScreen}),

    opening && React.createElement(OpeningOverlay, {opening, onClose: () => setOpening(null)}),

    saveModal && React.createElement('div', {className:'save-modal-bg'},
      React.createElement('div', {className:'save-modal'},
        React.createElement('h2', null, '💾 Sauvegarde'),
        React.createElement('p', {style:{color:'rgba(255,255,255,0.6)', fontSize:'0.85em', marginBottom:'12px', textAlign:'center'}},
          'Copie ce code pour sauvegarder ta progression :'
        ),
        React.createElement('textarea', {
          readOnly: true,
          value: saveCode,
          onClick: e => e.target.select()
        }),
        React.createElement('p', {style:{color:'rgba(255,255,255,0.6)', fontSize:'0.85em', marginBottom:'12px', textAlign:'center'}},
          'Ou colle un code existant pour charger :'
        ),
        React.createElement('textarea', {
          placeholder: 'Colle ton code de sauvegarde ici...',
          value: loadInput,
          onChange: e => setLoadInput(e.target.value),
          style:{background:'#0a0a20'}
        }),
        React.createElement('div', {className:'save-modal-btns'},
          React.createElement('button', {className:'sm-btn primary', onClick: handleCopyCode}, '📋 Copier le code'),
          React.createElement('button', {className:'sm-btn primary', onClick: handleLoadCode, disabled: !loadInput.trim()}, '📂 Charger'),
          React.createElement('button', {className:'sm-btn danger', onClick: handleReset}, '🗑️ Reset'),
          React.createElement('button', {className:'sm-btn', onClick: () => setSaveModal(false)}, '✖ Fermer')
        )
      )
    ),

    notifs.map(n => React.createElement('div', {key:n.id, className:'notif', style:{borderColor:n.color}}, n.msg))
  );
}

function MenuScreen({perSec, setScreen, offlineGain}) {
  return React.createElement('div', {className:'menu-center'},
    offlineGain && React.createElement('div', {className:'offline-banner'},
      '⏰ Pendant ton absence : +' + fmt(offlineGain) + ' 🪙 gagnées !'
    ),
    React.createElement('div', {className:'menu-logo pulse'}, '🧠💥🎰'),
    React.createElement('div', {className:'menu-subtitle'}, 'COLLECTIONNE · GAMBLE · DOMINE'),
    React.createElement('div', {className:'per-sec-badge'}, '⚡ ' + fmt(perSec) + ' pièces/sec'),
    React.createElement('div', {className:'menu-btns'},
      React.createElement('button', {className:'menu-btn btn-coll', onClick:()=>setScreen('collection')}, '📚 Collection'),
      React.createElement('button', {className:'menu-btn btn-shop', onClick:()=>setScreen('shop')}, '🛒 Boutique')
    )
  );
}

function ShopScreen({coins, setScreen, onOpen}) {
  return React.createElement('div', {style:{padding:'0 20px 40px'}},
    React.createElement('div', {className:'screen-top'},
      React.createElement('button', {className:'back-btn', onClick:()=>setScreen('menu')}, '⬅ Retour'),
      React.createElement('div', {className:'screen-title'}, '🛒 Boutique')
    ),
    React.createElement('div', {className:'chests-grid'},
      CHESTS.map(chest =>
        React.createElement('div', {key:chest.id, className:'chest-card bg-'+chest.id},
          React.createElement('div', {className:'chest-emoji-big chest-float'}, chest.emoji),
          React.createElement('div', {className:'chest-name'}, chest.name),
          React.createElement('div', {className:'chest-price'}, '🪙 ' + fmt(chest.price)),
          React.createElement('button', {
            className:'buy-btn',
            disabled: coins < chest.price,
            onClick: () => onOpen(chest.id)
          }, coins >= chest.price ? '🎁 Ouvrir !' : '🔒 Insuffisant'),
          React.createElement('div', {className:'chest-proba'},
            Object.entries(chest.proba).map(([r,p]) =>
              React.createElement('span', {key:r, style:{color:RARITIES[r].color, display:'block'}},
                RARITIES[r].label + ': ' + p + '%'
              )
            )
          )
        )
      )
    )
  );
}

function CollectionScreen({collection, perSec, setScreen}) {
  const entries = Object.entries(collection)
    .sort((a,b) => RARITY_ORDER.indexOf(a[1].rarity) - RARITY_ORDER.indexOf(b[1].rarity));
  const total = Object.values(collection).reduce((s,d)=>s+d.count,0);

  return React.createElement('div', {style:{padding:'0 20px 40px'}},
    React.createElement('div', {className:'screen-top'},
      React.createElement('button', {className:'back-btn', onClick:()=>setScreen('menu')}, '⬅ Retour'),
      React.createElement('div', {className:'screen-title'}, '📚 Collection')
    ),
    React.createElement('div', {className:'coll-stats'},
      '⚡ ' + fmt(perSec) + ' pièces/sec  |  🎴 ' + total + ' cartes'
    ),
    entries.length === 0
      ? React.createElement('div', {className:'empty'}, '🎴 Aucune carte encore !\nOuvre des coffres à la boutique !')
      : React.createElement('div', {className:'cards-grid'},
          entries.map(([name, d]) => {
            const r = RARITIES[d.rarity];
            return React.createElement('div', {key:name, className:'br-card', style:{boxShadow:'0 4px 14px '+r.color+'40'}},
              React.createElement('div', {className:'br-card-border', style:{borderColor:r.color}}),
              IMGS[name]
                ? React.createElement(ImgWithFallback, {src:IMGS[name], fallback:d.emoji, wrapClass:'br-img-wrap', emojiClass:'br-emoji'})
                : React.createElement('span', {className:'br-emoji'}, d.emoji),
              React.createElement('div', {className:'br-count'}, 'x'+d.count),
              React.createElement('div', {className:'br-name'}, name),
              React.createElement('div', {className:'br-rarity', style:{color:r.color}}, r.label),
              React.createElement('div', {className:'br-gain'}, '⚡ '+(r.gain*d.count)+'/s')
            );
          })
        )
  );
}

function OpeningOverlay({opening, onClose}) {
  const {chestEmoji, phase, br, rarity} = opening;
  const r = RARITIES[rarity];
  return React.createElement('div', {className:'overlay'},
    phase === 'shake' && React.createElement('div', {className:'opening-chest-anim'}, chestEmoji),
    (phase === 'reveal' || phase === 'ready') && React.createElement('div', {className:'card-reveal'},
      React.createElement('div', {className:'revealed-inner', style:{boxShadow:'0 0 40px '+r.color+'90'}},
        React.createElement('div', {className:'revealed-glow', style:{borderColor:r.color}}),
        React.createElement('div', {className:'revealed-label', style:{color:r.color}}, r.label),
        IMGS[br.name]
          ? React.createElement(ImgWithFallback, {src:IMGS[br.name], fallback:br.emoji, wrapClass:'revealed-img-wrap', emojiClass:'revealed-emoji'})
          : React.createElement('span', {className:'revealed-emoji'}, br.emoji),
        React.createElement('div', {className:'revealed-name'}, br.name),
        React.createElement('div', {className:'revealed-gain-txt'}, '⚡ +'+r.gain+' pièces/sec')
      )
    ),
    phase === 'ready' && React.createElement('button', {className:'continue-btn', onClick:onClose}, '🎉 Continuer !')
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
